services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pdf_processing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdf_processing"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/pdfs || true &&
      mc anonymous set none local/pdfs || true
      "

  api:
    build:
      context: .
      dockerfile: src/PDF.Processing.Service.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pdf_processing;Username=postgres;Password=postgres
      Minio__Endpoint: http://minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Minio__UseSsl: "false"
      Minio__Bucket: pdfs
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__User: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      RabbitMq__Exchange: pdf.processing
      RabbitMq__DlxExchange: pdf.processing.dlx
      RabbitMq__Queue: pdf.process
      RabbitMq__DlqQueue: pdf.process.dlq
      RabbitMq__RoutingKey: pdf.process.requested
      RabbitMq__DlqRoutingKey: pdf.process.dead
      PdfProcessing__MaxAttempts: "5"
      PdfProcessing__MaxFileSizeMb: "50"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: src/PDF.Processing.Service.Worker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pdf_processing;Username=postgres;Password=postgres
      Minio__Endpoint: http://minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Minio__UseSsl: "false"
      Minio__Bucket: pdfs
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__User: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      RabbitMq__Exchange: pdf.processing
      RabbitMq__DlxExchange: pdf.processing.dlx
      RabbitMq__Queue: pdf.process
      RabbitMq__DlqQueue: pdf.process.dlq
      RabbitMq__RoutingKey: pdf.process.requested
      RabbitMq__DlqRoutingKey: pdf.process.dead
      PdfProcessing__MaxAttempts: "5"
      PdfProcessing__MaxFileSizeMb: "50"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  miniodata:

